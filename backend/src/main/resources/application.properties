# =============================================================
# Andavar Oil & Masalas - Application Configuration
# =============================================================

# --- Application Name ---
spring.application.name=oil-masalas

# =============================================================
# DATABASE CONFIGURATION (MySQL)
# =============================================================
# The URL to connect to the MySQL database.
# 'andavar_db' is the database name — it will be auto-created if it does not exist.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/andavar_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}

# MySQL username and password
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root@1234}

# MySQL driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================
# JPA / HIBERNATE CONFIGURATION
# =============================================================
# 'update' means Hibernate will automatically create or update tables
# based on our Entity classes. It will NOT delete existing data.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# Show SQL queries in the console (helpful for debugging)
spring.jpa.show-sql=true

# Format the SQL output so it is easier to read
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we are using MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================================
# JWT (JSON Web Token) CONFIGURATION
# =============================================================
# Secret key used to sign JWT tokens. In production, use a long random string.
app.jwt.secret=AndavarMillKlrSecretKeyForJWTTokenGeneration2024VeryLongAndSecure!@#$%
# Token expiration time in milliseconds (24 hours = 86400000)
app.jwt.expiration=86400000

# =============================================================
# SERVER CONFIGURATION
# =============================================================
server.port=8080

# =============================================================
# FILE UPLOAD CONFIGURATION
# =============================================================
# Maximum file size for image uploads (10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================================
# STATIC RESOURCE CONFIGURATION
# =============================================================
# Serve product images from a folder on disk
# Images will be accessible at: http://localhost:8080/images/oil/coconut_oil.png
spring.web.resources.static-locations=classpath:/static/,file:./product-images/

# =============================================================
# LOGGING
# =============================================================
logging.level.com.andavarmillklr=DEBUG
